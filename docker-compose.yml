version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: finance-tracker-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongodb_data:/data/db
    networks:
      - finance-network

  backend:
    build: ./backend
    container_name: finance-tracker-backend
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URL: mongodb://admin:admin@mongodb:27017
      DATABASE_NAME: finance_tracker
      DEBUG: "True"
    volumes:
      - ./backend:/app
    networks:
      - finance-network
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: finance-tracker-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - finance-network

volumes:
  mongodb_data:

networks:
  finance-network:
    driver: bridge
